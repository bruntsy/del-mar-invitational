<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cushman Cup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #18352f;
      --bg-mid:       #25493e;
      --bg-lighter:   #386454;
      --panel:        #f2efe6;
      --panel-white:  #fffdf7;
      --panel-border: #d5ccb8;
      --cream-mid:    #e4dccb;
      --gold:         #c37a32;
      --gold-light:   #d99a4e;
      --gold-dark:    #8c4f25;
      --gold-muted:   rgba(195,122,50,0.35);
      --text-dark:    #1f211a;
      --text-mid:     #4f493b;
      --text-light:   #756d5a;
      --text-faint:   #a79b84;
      --slot-bg:      rgba(195,122,50,0.09);
      --slot-border:  rgba(195,122,50,0.32);
      --mist:         #d9e1d8;
      --water:        #7fa2a5;
      --maple:        #9f3f28;
      /* score colors */
      --eagle-bg:  #c37a32;
      --birdie-bg: #9f3f28;
      --bogey-bg:  #b8cfd0;
      --double-bg: #4f7c83;
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 80%, rgba(56,100,84,0.7) 0%, transparent 60%),
        radial-gradient(ellipse 58% 48% at 85% 10%, rgba(127,162,165,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 42% 36% at 72% 84%, rgba(159,63,40,0.18) 0%, transparent 58%);
      font-family: 'Lato', sans-serif;
      color: var(--text-dark);
    }

    /* ═══════════════════════════════════════════════════
       SETUP SCREEN
    ═══════════════════════════════════════════════════ */

    #setup-screen {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--panel);
      border-radius: 3px;
      max-width: 860px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(195,122,50,0.24),
                  inset 0 1px 0 rgba(255,255,255,0.6);
      overflow: hidden;
    }

    .hdr {
      background: var(--bg);
      padding: 2rem 2.5rem 1.75rem;
      text-align: center;
      border-bottom: 2px solid var(--gold);
      position: relative;
    }
    .hdr-ornament { color: var(--gold); font-size: 0.7rem; letter-spacing: 0.5em; opacity: 0.7; margin-bottom: 0.5rem; }
    .hdr-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; line-height: 1; }
    .hdr-sub { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.85rem; color: rgba(245,240,228,0.45); letter-spacing: 0.2em; margin-top: 0.4rem; }
    .hdr::before, .hdr::after { content: '◆'; position: absolute; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 0.6rem; opacity: 0.5; }
    .hdr::before { left: 1.5rem; }
    .hdr::after  { right: 1.5rem; }

    .content { padding: 2.25rem 2.5rem 2.5rem; }

    .section-label { display: flex; align-items: center; gap: 0.85rem; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-light); margin-bottom: 1.1rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--panel-border); }

    .course-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2.5rem; }

    .course-card { background: var(--panel-white); border: 2px solid var(--panel-border); border-radius: 3px; padding: 1.4rem 1.5rem; cursor: pointer; transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s; position: relative; text-align: center; }
    .course-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
    .course-card.selected { border-color: var(--gold); background: linear-gradient(150deg, #fff7ea 0%, #fffdf7 100%); box-shadow: 0 0 0 1px var(--gold-dark), 0 6px 20px rgba(195,122,50,0.18); }
    .course-check { display: none; position: absolute; top: 0.6rem; right: 0.6rem; width: 1.4rem; height: 1.4rem; background: var(--gold); border-radius: 50%; font-size: 0.65rem; color: white; font-weight: 700; align-items: center; justify-content: center; }
    .course-card.selected .course-check { display: flex; }
    .course-glyph { font-size: 1.75rem; margin-bottom: 0.6rem; line-height: 1; }
    .course-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.2rem; }
    .course-loc { font-size: 0.72rem; color: var(--text-light); letter-spacing: 0.06em; }
    .fairbanks-nines { display: none; margin: -1rem 0 2.5rem; }
    .fairbanks-nines.visible { display: block; }
    .nines-hint { font-size: 0.72rem; color: var(--text-light); letter-spacing: 0.04em; margin-bottom: 0.75rem; }
    .nines-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
    .nine-btn { background: var(--panel-white); border: 2px solid var(--panel-border); border-radius: 3px; padding: 0.55rem 0.4rem; cursor: pointer; font-size: 0.78rem; font-weight: 600; color: var(--text-dark); text-align: center; line-height: 1.35; transition: border-color 0.18s, background 0.18s; }
    .nine-btn:hover { border-color: var(--gold); }
    .nine-btn.selected { border-color: var(--gold); background: linear-gradient(150deg,#fff7ea 0%,#fffdf7 100%); color: var(--gold-dark); box-shadow: 0 0 0 1px var(--gold-dark); }

    .team-builder { display: grid; grid-template-columns: 1fr 160px 1fr; gap: 1.25rem; align-items: start; }

    .team-panel { border: 1px solid var(--panel-border); border-radius: 3px; overflow: hidden; }

    .team-hdr { background: var(--bg); padding: 0.65rem 1rem; text-align: center; border-bottom: 2px solid var(--gold); }
    .team-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; }
    .team-ct { font-size: 0.62rem; color: rgba(245,240,228,0.4); letter-spacing: 0.08em; margin-top: 0.1rem; }

    .team-slots { padding: 0.75rem; min-height: 178px; display: flex; flex-direction: column; gap: 0.5rem; background: var(--panel); }

    .slot { height: 44px; border-radius: 2px; display: flex; align-items: center; }
    .slot-empty { border: 1.5px dashed var(--slot-border); background: var(--slot-bg); justify-content: center; color: var(--text-faint); font-size: 0.68rem; font-style: italic; letter-spacing: 0.08em; }
    .slot-filled { border: 1.5px solid rgba(140,79,37,0.45); background: var(--panel-white); padding: 0 0.75rem; justify-content: space-between; cursor: pointer; transition: background 0.12s; user-select: none; }
    .slot-filled:hover { background: #fff7ea; }
    .slot-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 600; color: var(--text-dark); }
    .slot-x { font-size: 0.7rem; color: var(--text-faint); transition: color 0.12s; pointer-events: none; }
    .slot-filled:hover .slot-x { color: #c0392b; }

    .pool-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .pool-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-light); text-align: center; margin-bottom: 0.15rem; }
    .pool-hint { font-size: 0.62rem; color: var(--text-faint); text-align: center; font-style: italic; margin-bottom: 0.4rem; }

    .pool-drop-zone { display: flex; flex-direction: column; gap: 0.4rem; min-height: 80px; border-radius: 3px; padding: 2px; }

    .player-chip { background: var(--panel-white); border: 1.5px solid var(--panel-border); border-radius: 2px; padding: 0.5rem 0.75rem; cursor: pointer; text-align: center; transition: border-color 0.14s, transform 0.12s, box-shadow 0.12s; font-family: 'Playfair Display', serif; font-size: 0.92rem; font-weight: 600; color: var(--text-dark); user-select: none; }
    .player-chip:hover { border-color: var(--gold); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .pool-empty { font-size: 0.72rem; color: var(--text-faint); text-align: center; font-style: italic; padding: 1.5rem 0; }

    .start-section { margin-top: 2.25rem; text-align: center; }
    .start-btn { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bg); background: var(--gold); border: none; padding: 0.95rem 3.5rem; border-radius: 2px; cursor: pointer; transition: background 0.18s, transform 0.15s, box-shadow 0.18s; box-shadow: 0 2px 10px rgba(195,122,50,0.35); }
    .start-btn:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(195,122,50,0.42); }
    .start-btn:active:not(:disabled) { transform: translateY(0); }
    .start-btn:disabled { background: var(--cream-mid); color: var(--text-faint); cursor: not-allowed; box-shadow: none; }
    .val-msg { margin-top: 0.75rem; font-size: 0.75rem; color: var(--text-faint); font-style: italic; min-height: 1.1em; }

    /* ── Matchup selector ───────────────────────────── */
    #matchup-section { margin-bottom: 2rem; }

    /* ── Bets card ──────────────────────────────────── */
    #bets-section { margin-bottom: 2.5rem; }

    .bets-card {
      background: var(--panel-white);
      border: 1px solid var(--panel-border);
      border-radius: 3px;
      overflow: hidden;
    }

    .bet-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid var(--panel-border);
    }
    .bet-row:last-child { border-bottom: none; }

    .bet-label {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-dark);
      min-width: 78px;
      flex-shrink: 0;
    }

    .bet-inputs-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex: 1;
    }

    .bet-field {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .bet-sublabel {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      min-width: 30px;
    }

    .bet-dollar {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-mid);
    }

    .bet-unit {
      font-size: 0.68rem;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .bet-input {
      width: 62px;
      height: 40px;
      border: 1.5px solid var(--panel-border);
      border-radius: 2px;
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-dark);
      background: var(--panel);
      -moz-appearance: textfield;
      transition: border-color 0.15s, background 0.15s;
      touch-action: manipulation;
    }
    .bet-input:focus { outline: none; border-color: var(--gold); background: #fff7ea; }
    .bet-input::-webkit-outer-spin-button,
    .bet-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .game-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .game-card {
      background: var(--panel-white);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      overflow: hidden;
    }

    .game-card.enabled {
      border-color: rgba(195, 122, 50, 0.72);
      box-shadow: inset 4px 0 0 var(--gold);
    }

    .game-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.15rem;
    }

    .game-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .game-desc {
      margin-top: 0.15rem;
      font-size: 0.68rem;
      color: var(--text-faint);
    }

    .game-toggle {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-mid);
      font-weight: 700;
      white-space: nowrap;
    }

    .game-card-body {
      border-top: 1px solid var(--panel-border);
      padding: 0.85rem 1.15rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 0.85rem;
      background: var(--panel);
    }

    .game-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .game-field-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .money-field {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .game-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .game-summary {
      margin-top: 0.9rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      background: #fff7ea;
      color: var(--text-mid);
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .game-summary-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 0.25rem;
    }

    /* ── Settlement (results) ───────────────────────── */
    .settlement-list {
      padding: 0.75rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .settlement-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: var(--panel-white);
      border: 1px solid var(--panel-border);
      border-radius: 2px;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .settle-names {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-dark);
    }
    .settle-arrow { color: var(--text-faint); font-size: 0.8rem; }
    .settle-amount {
      font-family: 'Lato', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold-dark);
    }
    .settle-no-bets {
      padding: 1rem 1.25rem;
      font-size: 0.8rem;
      color: var(--text-faint);
      font-style: italic;
      text-align: center;
    }
    .pnl-table { width: 100%; border-collapse: collapse; margin-bottom: 0; }
    .pnl-table td, .pnl-table th {
      padding: 0.4rem 0.75rem;
      font-size: 0.82rem;
      text-align: center;
      border-bottom: 1px solid var(--panel-border);
    }
    .pnl-table th {
      background: var(--bg-lighter);
      color: rgba(245,240,228,0.55);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .pnl-table td:first-child { text-align: left; }
    .pnl-table tr:last-child td { border-bottom: none; }
    .pnl-pos { color: #27ae60; font-weight: 700; }
    .pnl-neg { color: #c0392b; font-weight: 700; }
    .settle-header {
      padding: 0.5rem 1.25rem 0.25rem;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .matchup-card {
      background: var(--panel-white);
      border: 1px solid var(--panel-border);
      border-radius: 3px;
      overflow: hidden;
    }

    .matchup-hint {
      background: var(--bg-mid);
      border-bottom: 1px solid rgba(195,122,50,0.2);
      padding: 0.5rem 1.25rem;
      font-size: 0.68rem;
      color: rgba(245,240,228,0.45);
      font-style: italic;
      text-align: center;
    }

    .matchup-row {
      display: flex;
      align-items: center;
      padding: 0.6rem 1.25rem;
      gap: 0.75rem;
      border-bottom: 1px solid var(--panel-border);
    }
    .matchup-row:last-child { border-bottom: none; }

    .matchup-num {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      width: 1.2rem;
      flex-shrink: 0;
      text-align: center;
    }

    .matchup-player {
      flex: 1;
      font-family: 'Playfair Display', serif;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-dark);
      padding: 0.4rem 0.75rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 2px;
      text-align: center;
    }

    .matchup-vs {
      font-family: 'Playfair Display', serif;
      font-size: 0.78rem;
      font-style: italic;
      color: var(--text-faint);
      flex-shrink: 0;
    }

    .matchup-t2-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .matchup-t2-name {
      flex: 1;
      font-family: 'Playfair Display', serif;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-dark);
      padding: 0.4rem 0.75rem;
      background: linear-gradient(135deg, #fff7ea 0%, white 100%);
      border: 1.5px solid rgba(195,122,50,0.45);
      border-radius: 2px;
      text-align: center;
    }

    .matchup-arrows {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }

    .matchup-btn {
      background: none;
      border: 1px solid var(--panel-border);
      border-radius: 2px;
      width: 1.5rem;
      height: 1.25rem;
      font-size: 0.6rem;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      line-height: 1;
    }
    .matchup-btn:hover:not(:disabled) { background: var(--gold); color: white; border-color: var(--gold); }
    .matchup-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    @media (max-width: 600px) {
      /* Setup */
      .content { padding: 1.25rem 1rem; }
      .team-builder { grid-template-columns: 1fr; }
      .team-builder > :nth-child(2) { order: -1; }
      .pool-drop-zone { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .player-chip { flex: 0 0 calc(50% - 0.2rem); }
      .course-grid { grid-template-columns: 1fr; }
      .hdr-title { font-size: 1.5rem; letter-spacing: 0.1em; }
      .hdr { padding: 1.25rem 1rem 1rem; }

      /* Matchup */
      .matchup-row { padding: 0.6rem 0.75rem; }

      /* Bets */
      .bet-row { padding: 0.65rem 0.75rem; }
      .bet-label { min-width: 64px; font-size: 0.82rem; }
      .bet-inputs-group { gap: 0.4rem; }
      .bet-input { width: 54px; height: 44px; font-size: 1rem; }
      .game-card-head { align-items: flex-start; padding: 0.8rem; }
      .game-card-body { grid-template-columns: 1fr; padding: 0.8rem; }
      .game-title { font-size: 0.95rem; }
      .game-card:not(.enabled) .game-card-head { padding: 0.55rem 0.75rem; }
      .game-card:not(.enabled) .game-desc { display: none; }
      .game-toggle { font-size: 0.76rem; }
      .money-field { width: 100%; }
      .money-field .bet-input { flex: 1; width: auto; text-align: left; padding-left: 0.8rem; }
      .game-presets .group-btn { width: auto; flex: 1 1 calc(50% - 0.5rem); }
      .setup-step-nav.sticky-mobile { position: sticky; bottom: 0; z-index: 20; margin: 1rem -1rem -1.25rem; padding: 0.75rem 1rem; background: rgba(238,240,232,0.96); border-top: 1px solid var(--panel-border); box-shadow: 0 -10px 22px rgba(21,20,18,0.08); }

      /* Results */
      .results-wrap { gap: 1rem; }
      #results-screen { padding: 1rem 0.75rem 2rem; }
      .team-score-grid { grid-template-columns: 1fr; }
      .team-score-vs { padding: 0.3rem; font-size: 0.75rem; }
      .tsb-score { font-size: 1.75rem; }
      .format-comp-grid { grid-template-columns: 1fr; }
      .format-comp-vs { padding: 0.25rem; font-size: 0.75rem; }
      .fcb-score { font-size: 1.5rem; }
      .results-section-hdr { font-size: 0.72rem; padding: 0.5rem 0.75rem; }
      .res-table { font-size: 0.82rem; }
      .res-table th, .res-table td { padding: 0.5rem 0.5rem; }
      .settlement-row { padding: 0.5rem; }
      .settle-names { font-size: 0.82rem; }

      /* Scorecard topbar */
      .sc-course-title { font-size: 0.9rem; }
      .sc-topbar { padding: 0.6rem 0.75rem; }
      .btn-ghost, .btn-danger, .btn-solid { padding: 0.5rem 0.6rem; font-size: 0.65rem; }
    }

    /* ═══════════════════════════════════════════════════
       SCORECARD SCREEN
    ═══════════════════════════════════════════════════ */

    #scorecard-screen { display: none; flex-direction: column; min-height: 100vh; }

    .sc-topbar {
      background: var(--bg);
      border-bottom: 2px solid var(--gold);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .sc-course-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .sc-course-sub {
      font-size: 0.7rem;
      color: rgba(245,240,228,0.45);
      letter-spacing: 0.08em;
      margin-top: 0.1rem;
    }

    .sc-topbar-btns { display: flex; justify-content: flex-end; flex-wrap: wrap; gap: 0.75rem; }

    .btn-ghost {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1.5px solid rgba(195,122,50,0.4);
      background: transparent;
      color: var(--gold);
      padding: 0.45rem 1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { background: rgba(195,122,50,0.12); border-color: var(--gold); }

    .btn-solid {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      background: var(--gold);
      color: var(--bg);
      padding: 0.45rem 1.1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-solid:hover { background: var(--gold-light); }

    .btn-danger {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1.5px solid rgba(192,57,43,0.5);
      background: transparent;
      color: #e74c3c;
      padding: 0.45rem 1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: rgba(192,57,43,0.1); }

    .sc-table-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      background: var(--panel);
    }

    /* Scorecard table */
    table.sc-table {
      border-collapse: collapse;
      table-layout: fixed;
      min-width: max-content;
      background: var(--panel);
    }

    /* Column widths */
    table.sc-table col.col-name   { width: 130px; }
    table.sc-table col.col-hole   { width: 50px; }
    table.sc-table col.col-sum    { width: 58px; }
    table.sc-table col.col-out    { width: 58px; }
    table.sc-table col.col-net    { width: 60px; }
    table.sc-table col.col-skins  { width: 60px; }

    table.sc-table td, table.sc-table th {
      border: 1px solid var(--panel-border);
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
      padding: 0;
    }

    /* Sticky first column */
    table.sc-table td:first-child,
    table.sc-table th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      text-align: left;
      border-right: 2px solid var(--panel-border);
    }

    /* Header rows */
    .row-holes th {
      background: var(--bg);
      color: rgba(245,240,228,0.5);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      height: 28px;
      padding: 0 4px;
    }
    .row-holes th:first-child { background: var(--bg); }
    .row-holes th.col-out-h, .row-holes th.col-in-h { color: var(--gold); }

    .row-par td {
      background: var(--bg-mid);
      color: rgba(245,240,228,0.85);
      font-size: 0.8rem;
      font-weight: 700;
      height: 32px;
      padding: 0 4px;
    }
    .row-par td:first-child { padding: 0 8px; background: var(--bg-mid); color: var(--gold); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }

    .row-ydg td {
      background: var(--bg-mid);
      color: rgba(245,240,228,0.4);
      font-size: 0.72rem;
      height: 26px;
      padding: 0 4px;
    }
    .row-ydg td:first-child { padding: 0 8px; background: var(--bg-mid); color: rgba(245,240,228,0.35); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; }

    .row-si td {
      background: var(--bg-lighter);
      color: rgba(245,240,228,0.6);
      font-size: 0.72rem;
      height: 26px;
      padding: 0 4px;
    }
    .row-si td:first-child { padding: 0 8px; background: var(--bg-lighter); color: rgba(245,240,228,0.5); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Team divider row */
    .row-team-divider td {
      background: var(--bg);
      color: var(--gold);
      font-family: 'Playfair Display', serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      height: 30px;
      padding: 0 10px;
      border-top: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
    }

    /* Player rows */
    .row-player { height: 52px; }
    .row-player:nth-child(odd) td { background: var(--panel-white); }
    .row-player:nth-child(even) td { background: var(--panel); }

    /* Sticky name cell overrides for player rows */
    .row-player td.name-cell {
      padding: 6px 10px;
      background: var(--panel-white);
      border-right: 2px solid var(--panel-border);
    }
    .row-player:nth-child(even) td.name-cell { background: #e8e0d0; }

    .cell-pname {
      font-family: 'Playfair Display', serif;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
    }
    .cell-hcp {
      font-size: 0.62rem;
      color: var(--text-faint);
      letter-spacing: 0.05em;
    }

    /* Score input cells */
    td.score-cell {
      padding: 0;
      position: relative;
    }

    .sc-cell-inner {
      position: relative;
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    td.score-cell input[type="number"] {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-dark);
      cursor: pointer;
      -moz-appearance: textfield;
      position: relative;
      z-index: 1;
      touch-action: manipulation;
    }
    td.score-cell input[type="number"]::-webkit-outer-spin-button,
    td.score-cell input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    td.score-cell input[type="number"]:focus { outline: none; background: rgba(195,122,50,0.12); }

    .stroke-dot {
      position: absolute;
      bottom: 4px;
      right: 5px;
      font-size: 0.5rem;
      color: var(--gold-dark);
      line-height: 1;
      pointer-events: none;
      z-index: 2;
    }

    /* Score color coding */
    td.score-eagle { background: var(--eagle-bg) !important; }
    td.score-eagle input { color: #fff !important; }
    td.score-birdie { background: var(--birdie-bg) !important; }
    td.score-birdie input { color: #fff !important; }
    td.score-par { /* default */ }
    td.score-bogey { background: var(--bogey-bg) !important; }
    td.score-double { background: var(--double-bg) !important; }
    td.score-double input { color: #fff !important; }

    /* Sum cells */
    td.sum-cell {
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-mid);
      background: var(--cream-mid) !important;
      padding: 0 4px;
    }
    td.sum-cell.out-col, td.sum-cell.in-col {
      border-left: 2px solid var(--panel-border);
      border-right: 2px solid var(--panel-border);
    }
    td.sum-cell.total-col { border-left: 2px solid var(--panel-border); }
    td.sum-cell.net-col { color: var(--bg); font-weight: 700; }
    td.sum-cell.skins-col { color: var(--gold-dark); font-weight: 700; }

    /* Par row sum cells */
    .row-par td.out-col, .row-par td.in-col, .row-par td.total-col,
    .row-par td.net-col, .row-par td.skins-col {
      color: var(--gold);
      font-weight: 700;
    }

    /* ═══════════════════════════════════════════════════
       RESULTS SCREEN
    ═══════════════════════════════════════════════════ */

    #results-screen { display: none; padding: 2rem 1rem 3rem; }

    .results-wrap {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .results-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid rgba(195,122,50,0.3);
      border-radius: 3px;
      padding: 0.75rem 1.25rem;
    }

    .results-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .results-section {
      background: var(--panel);
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .results-section-hdr {
      background: var(--bg-mid);
      padding: 0.6rem 1.25rem;
      border-bottom: 2px solid var(--gold);
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .pair-live-panel {
      background: var(--panel);
      border-bottom: 2px solid var(--gold);
      padding: 0.85rem 1rem;
    }
    .pair-live-panel[style*="display:none"] { display: none !important; }
    .pair-live-title {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: baseline;
      margin-bottom: 0.65rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .pair-live-total {
      color: var(--text-light);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
    }
    .pair-live-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 0.75rem;
    }
    .pair-live-card {
      background: var(--panel-white);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .pair-live-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: stretch;
      border-bottom: 1px solid var(--panel-border);
      background: #f4efe3;
    }
    .pair-live-side {
      padding: 0.55rem 0.65rem;
      min-width: 0;
    }
    .pair-live-side.win { background: rgba(195,122,50,0.18); }
    .pair-live-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pair-live-meta {
      margin-top: 0.12rem;
      color: var(--text-light);
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .pair-live-score {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      padding: 0.5rem 0.65rem;
      border-left: 1px solid var(--panel-border);
      border-right: 1px solid var(--panel-border);
      font-size: 1rem;
      font-weight: 800;
      color: var(--bg);
    }
    .pair-live-holes {
      display: grid;
      grid-template-columns: repeat(18, minmax(32px, 1fr));
      gap: 1px;
      background: var(--panel-border);
    }
    .pair-live-hole {
      min-height: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      color: var(--text-light);
      line-height: 1.05;
    }
    .pair-live-hole-num {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--text-faint);
    }
    .pair-live-hole-result {
      margin-top: 0.1rem;
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--text-dark);
    }
    .pair-live-hole.side-a { background: #e4f1f8; }
    .pair-live-hole.side-b { background: #f4dfd7; }
    .pair-live-hole.tie { background: #e6ded0; }
    .pair-live-hole.pending .pair-live-hole-result { color: var(--text-faint); }

    table.res-table {
      width: 100%;
      border-collapse: collapse;
    }

    table.res-table thead th {
      background: var(--bg-lighter);
      color: rgba(245,240,228,0.6);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(195,122,50,0.2);
    }
    table.res-table thead th:not(:first-child) { text-align: center; }

    table.res-table tbody tr { border-bottom: 1px solid var(--panel-border); }
    table.res-table tbody tr:last-child { border-bottom: none; }
    table.res-table tbody tr:nth-child(even) td { background: #e8e0d0; }

    table.res-table tbody td {
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      color: var(--text-dark);
      text-align: center;
    }
    table.res-table tbody td:first-child { text-align: left; }

    .res-rank { font-size: 0.7rem; color: var(--text-faint); margin-right: 0.4rem; }
    .res-player-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.95rem; }
    .res-winner { color: var(--gold-dark); }
    .res-net-val { font-weight: 700; color: var(--bg); }
    .res-skins-val { font-weight: 700; color: var(--gold-dark); }

    .team-score-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1px;
      background: var(--panel-border);
    }

    .team-score-box {
      background: var(--panel);
      padding: 1.5rem;
      text-align: center;
    }
    .team-score-box.winner { background: linear-gradient(135deg, #fff7ea 0%, var(--panel) 100%); }

    .tsb-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 0.4rem; }
    .tsb-score { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: var(--text-dark); line-height: 1; }
    .tsb-score.winner-score { color: var(--gold-dark); }
    .tsb-tag { font-size: 0.7rem; color: var(--text-faint); margin-top: 0.3rem; font-style: italic; }
    .tsb-tag.winner-tag { color: var(--gold-dark); font-weight: 700; font-style: normal; letter-spacing: 0.05em; }

    .team-score-vs {
      background: var(--bg-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: rgba(245,240,228,0.3);
      font-style: italic;
    }

    /* Skins breakdown */
    .skins-carry-row td { color: var(--text-faint) !important; font-style: italic; }
    .skins-winner-name { font-family: 'Playfair Display', serif; font-weight: 700; }
    .skins-pot-badge {
      display: inline-block;
      background: var(--gold);
      color: var(--bg);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }

    .res-footer { text-align: center; padding-top: 0.5rem; }

    .provisional-note {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(245,240,228,0.4);
      font-style: italic;
      padding: 0.5rem 1.25rem 0.75rem;
      background: var(--bg-mid);
    }

    /* Best Ball / 2-Ball team format rows */
    .row-best-ball td, .row-two-ball td {
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text-mid);
    }
    .row-best-ball td { background: #d9d2bd !important; }
    .row-two-ball td  { background: #d0c8b3 !important; }
    .row-best-ball td.name-cell, .row-two-ball td.name-cell {
      text-align: left;
      padding: 5px 10px;
      border-right: 2px solid var(--panel-border);
    }
    .row-best-ball td.sum-cell, .row-two-ball td.sum-cell {
      background: #c3baa4 !important;
      color: var(--text-dark);
    }
    .fmt-row-label {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
    }
    .fmt-row-sub {
      font-size: 0.6rem;
      color: var(--text-light);
      letter-spacing: 0.04em;
      font-weight: 400;
    }
    td.fmt-cell {
      text-align: center;
      vertical-align: middle;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-mid);
    }

    /* Results: format competition */
    .format-comp-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1px;
      background: var(--panel-border);
    }
    .format-comp-box {
      background: var(--panel);
      padding: 1rem 1.5rem;
      text-align: center;
    }
    .format-comp-box.winner { background: linear-gradient(135deg, #fff7ea 0%, var(--panel) 100%); }
    .fcb-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 0.6rem; }
    .fcb-breakdown { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.6rem; border-bottom: 1px solid var(--panel-border); padding-bottom: 0.6rem; }
    .fcb-bd-item { text-align: center; }
    .fcb-bd-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); }
    .fcb-bd-val { font-family: 'Lato', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text-mid); line-height: 1.3; }
    .fcb-total-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 0.15rem; }
    .fcb-score { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--text-dark); line-height: 1; }
    .fcb-score.winner-score { color: var(--gold-dark); }
    .fcb-tag { font-size: 0.68rem; color: var(--text-faint); margin-top: 0.3rem; font-style: italic; }
    .fcb-tag.winner-tag { color: var(--gold-dark); font-weight: 700; font-style: normal; }
    .format-comp-vs {
      background: var(--bg-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.75rem;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      color: rgba(245,240,228,0.3);
      font-style: italic;
    }
    .format-section-sub {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,240,228,0.45);
      margin-left: 0.75rem;
      font-weight: 400;
      font-style: italic;
    }

    .nav-btns { display: flex; gap: 0.5rem; margin-bottom: 1.6rem; }

    /* ─── Complete Round button ─── */
    .btn-complete { background: #27ae60; color: #fff; border: none; border-radius: 3px; padding: 0.5rem 1rem; font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.07em; cursor: pointer; transition: background 0.15s; }
    .btn-complete:hover { background: #2ecc71; }
    .completed-badge { background: rgba(39,174,96,0.12); color: #27ae60; border: 1px solid rgba(39,174,96,0.35); border-radius: 3px; padding: 0.35rem 0.75rem; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em; display: inline-flex; align-items: center; gap: 0.35rem; }

    /* ─── Putt rows ─── */
    .putt-toggle-btn {
      background: none;
      border: 1px solid rgba(195,122,50,0.3);
      border-radius: 2px;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold);
      padding: 0.15rem 0.35rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      flex-shrink: 0;
      line-height: 1.4;
    }
    .putt-toggle-btn:hover { background: rgba(195,122,50,0.12); }

    .row-putts td { background: var(--bg-lighter) !important; border-top: none !important; }
    .row-putts td.name-cell { padding: 3px 10px; background: var(--bg-lighter) !important; }

    .putt-cell { padding: 0; text-align: center; }
    .putt-inp {
      width: 100%; height: 34px; border: none; background: transparent;
      text-align: center; font-family: 'Lato', sans-serif; font-size: 1rem; font-weight: 700;
      color: rgba(245,240,228,0.4); -moz-appearance: textfield; cursor: pointer;
      touch-action: manipulation;
    }
    .putt-inp::-webkit-outer-spin-button,
    .putt-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .putt-inp:focus { outline: none; background: rgba(195,122,50,0.1); color: rgba(245,240,228,0.9); }
    .putt-1 { color: #27ae60 !important; }
    .putt-2 { color: rgba(245,240,228,0.75) !important; }

function migrateLegacyState(){

    const old=JSON.parse(raw);
    if(!old.team1?.length && !old.team2?.length) return false;
    const players={};
    Object.entries(old.players || {}).forEach(([name,p])=>{ players[name]={ name, handicapIndex:Number(p.handicapIndex ?? 0) }; });
    [...(old.team1||[]), ...(old.team2||[])].forEach(name=>{ if(!players[name]) players[name]={ name, handicapIndex:0 }; });
    GROUP={ id:null, roomCode:old.roomCode || null, name:'Migrated Group', players };
    const legacyCourse=LEGACY_COURSES[old.course] || null;
    ROUND={

      team1:old.team1||[], team2:old.team2||[], teamNames:{team1:'Team 1',team2:'Team 2'}, pairMatches:[], playingGroups:autoPlayingGroups([...(old.team1||[]), ...(old.team2||[])]), matchups:old.matchups||[], games:legacyBetsToGames(old.bets || {}),

function eventComputedStandings(cfg, rows=[]){

  cfg.rounds.forEach((r,i)=>{

    const row=byId[r.roundId], st=row? (typeof row.state==='string'?JSON.parse(row.state):row.state) : null, res=st?eventRoundResultFromState(st,row,cfg,i):null;

  if(r.roundId){
    const { data, error } = await _db.from('rounds').select('id,group_id,state,completed,created_at').eq('id', r.roundId).maybeSingle();
    if(!error && data){ ROUND=normalizeRound(data); ROUND.playingGroups=autoPlayingGroupsFromPairMatches(r.pairMatches||[], [...cfg.team1,...cfg.team2], cfg.team1, cfg.team2); saveState(); scheduleSync(); resumeRound(); return; }
  }
  ROUND={
    id:null, groupId:GROUP.id, event:{id:EVENT.id, roundIndex:roundIdx, name:EVENT.name || groupName()}, course:null,
    team1:[...cfg.team1], team2:[...cfg.team2], teamNames:{team1:cfg.teamNames.team1,team2:cfg.teamNames.team2},
    pairMatches:[...(r.pairMatches||[])], playingGroups:autoPlayingGroupsFromPairMatches(r.pairMatches||[], [...cfg.team1,...cfg.team2], cfg.team1, cfg.team2), matchups:[],

function renderConfirmGroupRows(){

    return allPlayers.map(p=>{
      const idx=Math.max(0,ROUND.playingGroups.findIndex(g=>g.players.includes(p)));

  }).join('');

function setConfirmPairGroup(matchIdx, side, groupIdx, singlePlayer){

function playerToPar(player,strokes){

    any=true;
    total+=scores[h]-(getsStroke(strokes[player],ROUND.course.si[h])?1:0)-ROUND.course.par[h];

}

function teamGameStatus(a,b){
  const t1=shortTeamLabel('team1'), t2=shortTeamLabel('team2');
  if(a==null&&b==null)return {primary:'Pending', note:'enter scores'};
  if(a==null)return {primary:`${t2} ${formatToPar(b)}`, note:`waiting on ${t1}`};
  if(b==null)return {primary:`${t1} ${formatToPar(a)}`, note:`waiting on ${t2}`};
  if(a===b)return {primary:'All square', note:`both ${formatToPar(a)}`};
  const lead=a<b?t1:t2, score=a<b?a:b;
  return {primary:`${lead} ${formatToPar(score)}`, note:`leads by ${Math.abs(a-b)}`};
}
function pointsGameStatus(a,b){
  const t1=shortTeamLabel('team1'), t2=shortTeamLabel('team2');
  if(!a&&!b)return {primary:'Pending', note:'enter scores'};
  if(a===b)return {primary:'All square', note:`${a} each`};
  const lead=a>b?t1:t2;
  return {primary:`${lead} ${Math.max(a,b)}`, note:`leads by ${Math.abs(a-b)}`};
}
function teamGameToPar(teamPlayers,strokes,type,format){
  const multiplier=format==='twoBall'?2:format==='aggy'?teamPlayers.length:1;
  let total=0, any=false;
  for(let h=0;h<18;h++){
    const val=computeTeamHoleStats(teamPlayers,strokes,h,type)[format];
    if(val==null) continue;
    any=true;
    total+=val-(ROUND.course.par[h]*multiplier);
  }
  return any?total:null;
}

async function pushToSupabase(){
  if(!ROUND?.id)return;
  const {data}=await _db.from('rounds').select('id,group_id,state,completed').eq('id',ROUND.id).single();
  if(data){
    const remote=normalizeRound(data);
    ROUND=mergeRoundData(ROUND, remote, false);
    saveState();
  }
  const state=roundForDb();
  const payload=JSON.stringify(state);
  _lastPushed=payload;
  await _db.from('rounds').update({ state, completed:ROUND.completed||false }).eq('id',ROUND.id);
}
function subscribeToGroup(){ if(!GROUP?.id)return; stopGroupSubscription(); GROUP_CHANNEL=_db.channel('group-'+GROUP.id).on('postgres_changes',{event:'*',schema:'public',table:'rounds',filter:`group_id=eq.${GROUP.id}`},payload=>{ EVENT_ROUND_CACHE_KEY=''; const row=payload.new; if(!row?.state)return; const incoming=typeof row.state==='string'?row.state:JSON.stringify(row.state); if(incoming===_lastPushed)return; const next=normalizeRound(row); if(payload.eventType==='INSERT' && !next.completed){ ROUND=next; saveState(); if(!_eventBuilderOpen) renderHub(); return; } if(ROUND?.id && row.id===ROUND.id) applyRemoteRound(next); }).subscribe(); startPolling(); }

function applyRemoteRound(remote){

  ROUND=mergeRoundData(ROUND || {}, remote, true);
  const afterRemote=JSON.stringify({scores:remote?.scores||{}, putts:remote?.putts||{}});
  const localHadExtra=before!==afterRemote && JSON.stringify({scores:ROUND?.scores||{}, putts:ROUND?.putts||{}})!==afterRemote;
  saveState();
  const onScorecard=document.getElementById('scorecard-screen').style.display!=='none', onResults=document.getElementById('results-screen').style.display!=='none', onHub=document.getElementById('hub-screen').style.display!=='none';
  if(onScorecard){ const typing=document.activeElement&&document.activeElement.tagName==='INPUT'&&document.getElementById('scorecard-screen').contains(document.activeElement); if(!typing)renderScorecard(); }

function startPolling(){ if(_pollTimer)clearInterval(_pollTimer); _pollTimer=setInterval(async()=>{ if(!ROUND?.id)return; const {data}=await _db.from('rounds').select('id,group_id,state,completed').eq('id',ROUND.id).single(); if(data)applyRemoteRound(normalizeRound(data)); },10000); }

async function showStats(){ if(!GROUP)return; showScreen('stats'); const wrap=document.getElementById('stats-wrap'); wrap.innerHTML=`<div class="screen-topbar"><div class="screen-topbar-title">◆ All-Time Stats</div><button class="btn-ghost" onclick="showHub()">← Back</button></div><div style="color:var(--gold);padding:1rem;opacity:0.7">Loading...</div>`; const {data,error}=await _db.from('rounds').select('state,completed_at').eq('group_id',GROUP.id).eq('completed',true); if(error){wrap.innerHTML+=`<div style="color:#c0392b">${escHtml(error.message)}</div>`;return;} renderStats(data||[]); }
function renderStats(rounds){ const agg={}; rounds.forEach(r=>{ const st=typeof r.state==='string'?JSON.parse(r.state):r.state, plrs=[...(st.team1||[]),...(st.team2||[])], strk=_stateStrokes(st), {skinsByPlayer}=_stateSkins(st); plrs.forEach(p=>{ if(!agg[p])agg[p]={rounds:0,skinsWon:0,nets:[],bestNet:Infinity,h2hW:0,h2hL:0,h2hT:0}; agg[p].rounds++; agg[p].skinsWon+=skinsByPlayer[p]||0; const net=_stateNet(st,p,strk); if(net!=null){agg[p].nets.push(net); agg[p].bestNet=Math.min(agg[p].bestNet,net);} }); (st.matchups||[]).forEach(m=>{ const n1=_stateNet(st,m.t1,strk), n2=_stateNet(st,m.t2,strk); if(n1==null||n2==null)return; if(n1<n2){if(agg[m.t1])agg[m.t1].h2hW++; if(agg[m.t2])agg[m.t2].h2hL++;} else if(n2<n1){if(agg[m.t2])agg[m.t2].h2hW++; if(agg[m.t1])agg[m.t1].h2hL++;} else {if(agg[m.t1])agg[m.t1].h2hT++; if(agg[m.t2])agg[m.t2].h2hT++;} }); }); let html=`<div class="screen-topbar"><div class="screen-topbar-title">◆ All-Time Stats</div><button class="btn-ghost" onclick="showHub()">← Back</button></div>`; const sorted=Object.keys(agg).sort((a,b)=>(agg[b].rounds-agg[a].rounds)||(agg[b].skinsWon-agg[a].skinsWon)); if(!sorted.length){document.getElementById('stats-wrap').innerHTML=html+'<div style="color:var(--gold);opacity:0.6;padding:1rem">No completed rounds yet.</div>';return;} sorted.forEach(p=>{ const a=agg[p], avg=a.nets.length?(sum(a.nets)/a.nets.length).toFixed(1):'—', best=a.bestNet<Infinity?a.bestNet:'—', h2h=`${a.h2hW}-${a.h2hL}${a.h2hT?'-'+a.h2hT:''}`; html+=`<div class="stats-player-card"><div class="stats-player-name">${escHtml(p)}</div><div class="stats-stat"><div class="stats-stat-val">${a.rounds}</div><div class="stats-stat-lbl">Rounds</div></div><div class="stats-stat"><div class="stats-stat-val">${a.skinsWon}</div><div class="stats-stat-lbl">Skins</div></div><div class="stats-stat"><div class="stats-stat-val">${avg}</div><div class="stats-stat-lbl">Avg Net</div></div><div class="stats-stat"><div class="stats-stat-val">${best}</div><div class="stats- function eventRoundResultFromState(st,row,cfg,idx){
  const prevRound=ROUND, prevEvent=EVENT;
  ROUND=normalizeRound({id:row?.id||st.id, group_id:GROUP?.id, state:{...st,event:{...(st.event||{}),roundIndex:idx},teamNames:st.teamNames||cfg.teamNames}, completed:row?.completed||st.completed||false});
  EVENT={...(EVENT||{}),config:cfg};

}
function eventRoundStats(st){
  const plrs=[...(st.team1||[]),...(st.team2||[])], strk=_stateStrokes(st), skins=_stateSkins(st).skinsByPlayer, nets=plrs.map(p=>({p,net:_stateNet(st,p,strk)})).filter(x=>x.net!=null).sort((a,b)=>a.net-b.net);

}

function stateCourse(st){ if(st.course?.par) return st.course; const c=LEGACY_COURSES[st.course]; return c?legacyCourseToRoundCourse(st.course,c):null; }
function stateCourseName(st){ const c=stateCourse(st); return c?courseDisplayName(c):(st.course||'Unknown course'); }
function _stateStrokes(st){ const c=stateCourse(st), plrs=[...(st.team1||[]),...(st.team2||[])]; if(!c)return{}; const hcps=plrs.map(p=>st.players?.[p]?.handicapIndex!=null?computeWHSCourseHcp(st.players[p].handicapIndex,c.tee?.slope,c.tee?.rating,c.tee?.parTotal):Number(LEGACY_COURSES[st.course]?.hcp?.[p]||0)); const min=Math.min(...hcps); const res={}; plrs.forEach((p,i)=>res[p]=hcps[i]-min); return res; }
function _stateNet(st,player,strokes){ const c=stateCourse(st), sc=(st.scores||{})[player]; if(!c||!sc)return null; let net=0; for(let h=0;h<18;h++){ if(sc[h]==null)return null; net+=sc[h]-(getsStroke(strokes[player]||0,c.si[h])?1:0); } return net; }
function _stateSkins(st){ const c=stateCourse(st), plrs=[...(st.team1||[]),...(st.team2||[])], strk=_stateStrokes(st), by={}; plrs.forEach(p=>by[p]=0); if(!c)return{skinsByPlayer:by}; for(let h=0;h<18;h++){ if(!plrs.every(p=>(st.scores||{})[p]?.[h]!=null))break; const nets={}; plrs.forEach(p=>nets[p]=st.scores[p][h]-(getsStroke(strk[p]||0,c.si[h])?1:0)); const mn=Math.min(...Object.values(nets)), win=plrs.filter(p=>nets[p]===mn); if(win.length===1)by[win[0]]++; } return {skinsByPlayer:by}; }
